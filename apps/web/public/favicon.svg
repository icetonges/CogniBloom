<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <!-- Brand gradient background -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1d4ed8"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <!-- Ball sheen -->
    <radialGradient id="ball" cx="38%" cy="32%" r="60%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="70%" stop-color="#f0f0f0"/>
      <stop offset="100%" stop-color="#d8d8d8"/>
    </radialGradient>
    <!-- Gold shimmer -->
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>

  <!-- Energy rays behind ball -->
  <g opacity="0.25" stroke="#ffffff" stroke-width="1.2" stroke-linecap="round">
    <line x1="32" y1="6"  x2="32" y2="2"/>
    <line x1="32" y1="58" x2="32" y2="62"/>
    <line x1="6"  y1="32" x2="2"  y2="32"/>
    <line x1="58" y1="32" x2="62" y2="32"/>
    <line x1="13" y1="13" x2="10" y2="10"/>
    <line x1="51" y1="13" x2="54" y2="10"/>
    <line x1="13" y1="51" x2="10" y2="54"/>
    <line x1="51" y1="51" x2="54" y2="54"/>
  </g>

  <!-- Soccer ball circle -->
  <circle cx="32" cy="32" r="20" fill="url(#ball)" stroke="#c8c8c8" stroke-width="0.4"/>

  <!-- Center pentagon (black) -->
  <polygon
    points="32,23 37.8,27.1 35.6,33.8 28.4,33.8 26.2,27.1"
    fill="#111827"/>

  <!-- 5 surrounding black patches (classic soccer pattern) -->
  <!-- Top-left -->
  <polygon
    points="22.5,21 26.2,27.1 22,30.5 17.5,27.5 18.5,22"
    fill="#111827"/>
  <!-- Top-right -->
  <polygon
    points="41.5,21 37.8,27.1 42,30.5 46.5,27.5 45.5,22"
    fill="#111827"/>
  <!-- Bottom-left -->
  <polygon
    points="22,37.5 26.5,38 28.4,44.5 24,47.5 19.5,43.5"
    fill="#111827"/>
  <!-- Bottom-right -->
  <polygon
    points="42,37.5 37.5,38 35.6,44.5 40,47.5 44.5,43.5"
    fill="#111827"/>
  <!-- Bottom-center -->
  <polygon
    points="28.4,44.5 35.6,44.5 37,49.5 32,52 27,49.5"
    fill="#111827"/>

  <!-- Gold star — top-right corner (FIFA energy) -->
  <g transform="translate(50,10)">
    <polygon
      points="0,-5 1.2,-1.6 4.8,-1.6 2,0.6 3,4.2 0,2 -3,4.2 -2,0.6 -4.8,-1.6 -1.2,-1.6"
      fill="url(#gold)" transform="scale(0.85)"/>
  </g>

  <!-- Small sparkle dots -->
  <circle cx="10" cy="12" r="1.4" fill="#fde68a" opacity="0.9"/>
  <circle cx="14" cy="8"  r="0.9" fill="#fde68a" opacity="0.7"/>
  <circle cx="54" cy="52" r="1.2" fill="#fde68a" opacity="0.8"/>
</svg>
