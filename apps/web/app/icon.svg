<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e3a8a"/>
      <stop offset="50%" stop-color="#3b4fd8"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <radialGradient id="ball" cx="38%" cy="32%" r="65%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="60%" stop-color="#f4f4f8"/>
      <stop offset="100%" stop-color="#d1d5e8"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="1.5" flood-color="#0f172a" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="64" height="64" rx="13" fill="url(#bg)"/>

  <!-- Subtle grid lines (FIFA energy) -->
  <line x1="0" y1="32" x2="64" y2="32" stroke="#ffffff" stroke-width="0.3" opacity="0.08"/>
  <line x1="32" y1="0" x2="32" y2="64" stroke="#ffffff" stroke-width="0.3" opacity="0.08"/>

  <!-- Soccer ball with drop shadow -->
  <circle cx="31" cy="33" r="19.5" fill="#0f172a" opacity="0.25"/>
  <circle cx="31" cy="32" r="19.5" fill="url(#ball)" filter="url(#shadow)"/>

  <!--
    Classic soccer ball patch pattern (Telstar-style):
    Center pentagon + 5 surrounding patches
  -->

  <!-- Center black pentagon -->
  <polygon
    points="31,22.5 36.5,26.5 34.3,33 27.7,33 25.5,26.5"
    fill="#0f172a"/>

  <!-- Top patch (partially cut by ball edge) -->
  <polygon
    points="31,12.8 35.5,16 34,19.5 28,19.5 26.5,16"
    fill="#0f172a"/>

  <!-- Upper-right patch -->
  <polygon
    points="40,18 45,22 43.5,27.5 39,28 37,23"
    fill="#0f172a"/>

  <!-- Lower-right patch -->
  <polygon
    points="40.5,36 44,41.5 40.5,46 36.5,44 36,39"
    fill="#0f172a"/>

  <!-- Bottom patch -->
  <polygon
    points="31,49.5 36,46.5 36.5,44 25.5,44 26,46.5"
    fill="#0f172a"/>

  <!-- Lower-left patch -->
  <polygon
    points="21.5,36 18,41.5 21.5,46 25.5,44 26,39"
    fill="#0f172a"/>

  <!-- Upper-left patch -->
  <polygon
    points="22,18 17,22 18.5,27.5 23,28 25,23"
    fill="#0f172a"/>

  <!-- Gold star (top-right corner) -->
  <g transform="translate(52.5,11.5) scale(0.92)">
    <polygon
      points="0,-6 1.4,-2 5.7,-2 2.3,0.8 3.5,4.9 0,2.5 -3.5,4.9 -2.3,0.8 -5.7,-2 -1.4,-2"
      fill="#fbbf24"/>
    <polygon
      points="0,-6 1.4,-2 5.7,-2 2.3,0.8 3.5,4.9 0,2.5 -3.5,4.9 -2.3,0.8 -5.7,-2 -1.4,-2"
      fill="none" stroke="#f59e0b" stroke-width="0.3"/>
  </g>

  <!-- Small accent dots (energy sparks) -->
  <circle cx="9" cy="10" r="1.5" fill="#fbbf24" opacity="0.85"/>
  <circle cx="13.5" cy="6"  r="1"   fill="#fbbf24" opacity="0.6"/>
  <circle cx="6"  cy="14"  r="0.8"  fill="#fbbf24" opacity="0.5"/>
</svg>
