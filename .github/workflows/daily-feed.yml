name: Daily Feed & Summary

on:
  schedule:
    # 7 PM AEST (09:00 UTC) every day — good time for an evening summary
    - cron: '0 9 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  daily-tasks:
    name: Generate Feed + Send Summary Email
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      APP_URL: https://cognibloom.vercel.app

    steps:
      - name: Refresh daily knowledge feed
        run: |
          echo "Refreshing daily feed..."
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "$APP_URL/api/feed?refresh=true")
          echo "Feed refresh status: $STATUS"

      - name: Ingest multi-source category feeds
        run: |
          echo "Ingesting category feeds (math, coding, science, etc.)..."
          RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" \
            -X POST "$APP_URL/api/feed/ingest?cleanup=true" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            --max-time 290)
          HTTP_STATUS=$(echo "$RESPONSE" | grep "HTTP_STATUS:" | cut -d: -f2)
          BODY=$(echo "$RESPONSE" | grep -v "HTTP_STATUS:")
          echo "Status: $HTTP_STATUS"
          echo "Response: $BODY"
          if [ "$HTTP_STATUS" = "200" ]; then
            TOTAL_NEW=$(echo "$BODY" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('summary',{}).get('totalNewItems',0))" 2>/dev/null || echo "?")
            echo "✅ Category ingest complete — $TOTAL_NEW new items"
          else
            echo "⚠️  Category ingest returned HTTP $HTTP_STATUS (non-blocking)"
          fi

      - name: Send daily summary email
        run: |
          echo "Sending daily summary to Daniel and parents..."
          RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" \
            -X POST "$APP_URL/api/email/daily-summary" \
            -H "Content-Type: application/json" \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}")
          HTTP_STATUS=$(echo "$RESPONSE" | grep "HTTP_STATUS:" | cut -d: -f2)
          BODY=$(echo "$RESPONSE" | grep -v "HTTP_STATUS:")
          echo "Status: $HTTP_STATUS"
          echo "Response: $BODY"
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "❌ Daily summary failed with status $HTTP_STATUS"
            exit 1
          fi
          echo "✅ Daily summary sent successfully"
