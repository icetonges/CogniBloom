name: Deploy to Vercel

on:
  push:
    branches: [main]

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9.0.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.x
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm -C apps/web run type-check

      - name: Generate Prisma client
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: pnpm -C apps/web exec prisma generate

      - name: Deploy to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "❌ VERCEL_TOKEN secret is not set in GitHub repository secrets"
            echo "Go to: Settings → Secrets and variables → Actions → New repository secret"
            exit 1
          fi
          npm install -g vercel
          vercel --prod --token "$VERCEL_TOKEN"

      - name: Run smoke tests
        run: |
          # Simple health check
          curl -f https://cognibleom.vercel.app/api/health || exit 1

      - name: Deployment Status
        if: success()
        run: echo "✅ Successfully deployed to production"

      - name: Deployment Failed
        if: failure()
        run: |
          echo "❌ Deployment failed"
          exit 1
