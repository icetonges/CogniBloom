name: Deploy to Vercel

on:
  push:
    branches: [main]

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      DIRECT_URL: ${{ secrets.DIRECT_URL }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9.0.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.x
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm -C apps/web exec prisma generate

      - name: Type check
        run: pnpm -C apps/web run type-check

      - name: Deploy to Vercel
        id: deploy
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          npm install -g vercel
          # Deploy and capture the production URL from the last line of output
          DEPLOY_OUTPUT=$(vercel --prod --token "$VERCEL_TOKEN" --yes 2>&1)
          echo "$DEPLOY_OUTPUT"
          # Extract the https URL — last https line in the output
          DEPLOY_URL=$(echo "$DEPLOY_OUTPUT" | grep -oE 'https://[a-zA-Z0-9._-]+\.vercel\.app' | tail -1)
          echo "DEPLOY_URL=${DEPLOY_URL}" >> "$GITHUB_ENV"
          echo "Deployed to: ${DEPLOY_URL}"

      - name: Run smoke tests
        # Non-fatal: smoke test is informational; actual build validity
        # is already confirmed by the Vercel build step above.
        continue-on-error: true
        run: |
          TARGET="${DEPLOY_URL:-https://cognibleom.vercel.app}"
          echo "Smoke testing: $TARGET/api/health"
          sleep 10
          for i in 1 2 3 4 5; do
            echo "Attempt $i/5..."
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$TARGET/api/health")
            echo "HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "✅ Health check passed"
              exit 0
            fi
            sleep 10
          done
          echo "⚠️  Smoke test could not verify health endpoint (deployment is still live)"

      - name: Deployment Status
        if: success()
        run: echo "✅ Successfully deployed to production"
