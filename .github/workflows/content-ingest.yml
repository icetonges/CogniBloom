name: Educational Content Ingestion

on:
  schedule:
    # Every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ingest-content:
    name: Ingest & Index Educational Content
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      APP_URL: https://cognibloom.vercel.app
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Ingest Khan Academy content (math + science)
        run: |
          echo "Ingesting math and science topics..."
          RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" \
            -X POST "$APP_URL/api/admin/content/ingest" \
            -H "Authorization: Bearer ${{ secrets.ADMIN_SECRET_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"sources": ["khan-academy"], "limit": 20}')
          HTTP_STATUS=$(echo "$RESPONSE" | grep "HTTP_STATUS:" | cut -d: -f2)
          BODY=$(echo "$RESPONSE" | grep -v "HTTP_STATUS:")
          echo "Status: $HTTP_STATUS"
          echo "Response: $BODY"
        continue-on-error: true

      - name: Ingest educational websites (history + English + computing)
        run: |
          echo "Ingesting history, English, and computing topics..."
          RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" \
            -X POST "$APP_URL/api/admin/content/ingest" \
            -H "Authorization: Bearer ${{ secrets.ADMIN_SECRET_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"sources": ["edu-domains"], "limit": 20}')
          HTTP_STATUS=$(echo "$RESPONSE" | grep "HTTP_STATUS:" | cut -d: -f2)
          BODY=$(echo "$RESPONSE" | grep -v "HTTP_STATUS:")
          echo "Status: $HTTP_STATUS"
          echo "Response: $BODY"
        continue-on-error: true

      - name: Ingest arXiv research papers (math + CS)
        run: |
          echo "Ingesting arXiv papers..."
          RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" \
            -X POST "$APP_URL/api/admin/content/ingest" \
            -H "Authorization: Bearer ${{ secrets.ADMIN_SECRET_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"sources": ["arxiv"], "categories": ["math", "cs"], "limit": 10}')
          HTTP_STATUS=$(echo "$RESPONSE" | grep "HTTP_STATUS:" | cut -d: -f2)
          BODY=$(echo "$RESPONSE" | grep -v "HTTP_STATUS:")
          echo "Status: $HTTP_STATUS"
          echo "Response: $BODY"
        continue-on-error: true

      - name: Re-embed any pending uploads
        run: |
          echo "Batching embeddings for pending uploads..."
          RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" \
            -X POST "$APP_URL/api/admin/content/embed" \
            -H "Authorization: Bearer ${{ secrets.ADMIN_SECRET_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{}')
          HTTP_STATUS=$(echo "$RESPONSE" | grep "HTTP_STATUS:" | cut -d: -f2)
          BODY=$(echo "$RESPONSE" | grep -v "HTTP_STATUS:")
          echo "Status: $HTTP_STATUS"
          echo "Response: $BODY"
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "❌ Embed step failed with status $HTTP_STATUS"
            exit 1
          fi
          echo "✅ Content ingestion complete"

      - name: Check knowledge base status
        run: |
          echo "Checking knowledge base..."
          curl -s \
            "$APP_URL/api/admin/content/embed" \
            -H "Authorization: Bearer ${{ secrets.ADMIN_SECRET_KEY }}" | \
            python3 -c "import sys, json; d=json.load(sys.stdin)['data']; print(f\"Ready: {d['ready']} | Processing: {d['processing']} | Failed: {d['failed']} | Total: {d['total']}\")"
        continue-on-error: true

      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            core.warning('Content ingestion workflow had failures. Check logs for details.')
