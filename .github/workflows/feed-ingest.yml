name: Daily Feed Ingest

on:
  # Run twice daily — fresh morning content + afternoon refresh
  schedule:
    - cron: '0 6 * * *'   # 6:00 AM UTC (2 AM ET) — overnight content ready for morning
    - cron: '0 14 * * *'  # 2:00 PM UTC (10 AM ET) — midday refresh for afternoon content

  # Allow manual trigger from the Actions tab (for testing or on-demand refresh)
  workflow_dispatch:
    inputs:
      category:
        description: 'Single category to ingest (leave blank for all)'
        required: false
        default: ''
      cleanup:
        description: 'Delete expired items after ingesting'
        required: false
        default: 'true'

permissions:
  contents: read

jobs:
  ingest:
    name: Ingest Feed Content
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      APP_URL: https://cognibloom.vercel.app

    steps:
      - name: Trigger feed ingestion
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          # Build query params
          PARAMS="cleanup=${{ github.event.inputs.cleanup || 'true' }}"
          CAT="${{ github.event.inputs.category }}"
          if [ -n "$CAT" ]; then
            PARAMS="${PARAMS}&category=${CAT}"
          fi

          echo "Calling: ${APP_URL}/api/feed/ingest?${PARAMS}"

          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X POST \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            -H "Content-Type: application/json" \
            --max-time 540 \
            "${APP_URL}/api/feed/ingest?${PARAMS}")

          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n -1)

          echo "HTTP status: $HTTP_CODE"
          echo "Response: $BODY"

          if [ "$HTTP_CODE" != "200" ]; then
            echo "::error::Feed ingest failed with status $HTTP_CODE"
            exit 1
          fi

          # Print summary from JSON response
          echo "$BODY" | python3 -c "
          import json, sys
          try:
            d = json.load(sys.stdin)
            s = d.get('summary', {})
            print(f\"Categories processed: {s.get('categoriesProcessed', '?')}\")
            print(f\"New items added:       {s.get('totalNewItems', '?')}\")
            print(f\"Expired items cleaned: {s.get('cleanedUpExpired', '?')}\")
            print(f\"Duration:              {s.get('durationMs', '?')}ms\")
          except Exception as e:
            print('Could not parse summary:', e)
          " || true

      - name: Notify on failure
        if: failure()
        run: |
          echo "::warning::Feed ingestion failed. Check the logs above."
          echo "Make sure CRON_SECRET is set in repository secrets."
